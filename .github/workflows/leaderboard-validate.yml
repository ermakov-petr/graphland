name: Leaderboard validation

"on":
  pull_request: {}
  merge_group:
    types: [checks_requested]
  push:
    branches: [main]
    paths:
      - leaderboard/**
      - site/**
      - scripts/leaderboard/**
      - tests/leaderboard/**
      - requirements-leaderboard.txt
      - .github/ISSUE_TEMPLATE/leaderboard-submission.yml
      - .github/workflows/leaderboard-validate.yml
      - .github/workflows/leaderboard-issue-to-pr.yml
      - .github/workflows/deploy-pages.yml
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: leaderboard-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install leaderboard dependencies
        run: "python -m pip install --disable-pip-version-check --only-binary=:all: -r requirements-leaderboard.txt"

      - name: Run leaderboard unit tests
        run: python -m unittest discover -s tests/leaderboard -v

      - name: Validate leaderboard data
        run: python scripts/leaderboard/validate.py

      - name: Build first deterministic artifact
        run: python scripts/leaderboard/build.py --output "${RUNNER_TEMP}/site-a"

      - name: Build second deterministic artifact
        run: python scripts/leaderboard/build.py --output "${RUNNER_TEMP}/site-b"

      - name: Compare build artifacts
        run: diff -ruN --no-dereference "${RUNNER_TEMP}/site-a" "${RUNNER_TEMP}/site-b"
