name: Deploy leaderboard to Pages

"on":
  push:
    branches: [main]
    paths:
      - leaderboard/**
      - site/**
      - scripts/leaderboard/**
      - requirements-leaderboard.txt
      - .github/workflows/deploy-pages.yml
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install leaderboard dependencies
        run: "python -m pip install --disable-pip-version-check --only-binary=:all: -r requirements-leaderboard.txt"

      - name: Run leaderboard unit tests
        run: python -m unittest discover -s tests/leaderboard -v

      - name: Validate leaderboard data
        run: python scripts/leaderboard/validate.py

      - name: Build Pages artifact
        run: python scripts/leaderboard/build.py --output _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
